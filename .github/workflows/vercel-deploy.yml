name: Build & Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (capture logs)
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-frontend.log

      - name: Prepare frontend artifacts
        if: always()
        run: |
          if [ -d dist ]; then
            tar -czf dist-frontend.tar.gz dist || true
          else
            echo "no-dist" > no-dist-frontend.txt
          fi

      - name: Upload frontend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-artifacts
          path: |
            build-frontend.log
            dist-frontend.tar.gz
            no-dist-frontend.txt

      - name: Build server (if present, capture logs)
        if: always()
        run: |
          set -o pipefail
          if [ -f build-server.js ] || [ -f server/index.ts ]; then
            node build-server.js 2>&1 | tee build-server.log
          else
            echo "No server build required" > build-server.log
          fi

      - name: Prepare server artifacts
        if: always()
        run: |
          DIST_PATH=$(pwd)/dist
          if [ -d "$DIST_PATH" ]; then
            tar -czf dist-server.tar.gz -C $(dirname "$DIST_PATH") dist || true
          else
            echo "no-dist" > no-dist-server.txt
          fi

      - name: Upload server artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-build-artifacts
          path: |
            build-server.log
            dist-server.tar.gz
            no-dist-server.txt

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Optional: Run Neon migrations
        if: ${{ secrets.NEON_DATABASE_URL != '' }}
        run: |
          echo "NEON_DATABASE_URL present — run your migration commands here"
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Optional: Firestore / Firebase steps
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        run: |
          echo "FIREBASE_SERVICE_ACCOUNT present — add deployment/migration commands here"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
