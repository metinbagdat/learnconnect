name: Build & Deploy to Vercel

"on":
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || '' }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || '' }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: |
          npm install -g vercel
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Deploy skipped (no VERCEL_TOKEN secret)
        if: ${{ env.VERCEL_TOKEN == '' }}
        run: |
          echo "VERCEL_TOKEN secret is not set in GitHub repository secrets."
          echo "Add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID at:"
          echo "https://github.com/metinbagdat/learnconnect/settings/secrets/actions"
