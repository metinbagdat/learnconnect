# Verifies Vite build on Ubuntu when package.json changes outpace package-lock (e.g. local npm SSL issues).
name: Frontend build

on:
  push:
    branches:
      - main
      - develop
      - 'study-track-*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        run: npm run build
