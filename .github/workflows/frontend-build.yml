# Verifies Vite build on Ubuntu when package.json changes outpace package-lock (e.g. local npm SSL issues).
name: Frontend build

on:
  push:
    branches:
      - main
      - develop
      - 'study-track-*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci || npm install
          else
            npm install
          fi

      - name: Build (Vite)
        run: npm run build
