# CI workflow configuration

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fmt
        run: make fmt

      - name: Build project
        run: make build

      - name: Run tests
        run: make test

      - name: Run CI
        run: make ci