# CI workflow configuration

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Run fmt
        run: make fmt
      
      - name: Build project
        run: make build
      
      - name: Run tests
        run: make test
      
      - name: Run CI
        run: make ci