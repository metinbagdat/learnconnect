# CI workflow configuration

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run make fmt
        run: make fmt

      - name: Run make build
        run: make build

      - name: Run make test
        run: make test

      - name: Run make ci
        run: make ci

