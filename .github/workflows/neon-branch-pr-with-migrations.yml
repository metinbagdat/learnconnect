name: Create/Delete Branch for Pull Request (with Migrations)

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  pull-requests: write

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

  create_neon_branch:
    name: Create Neon Branch & Run Migrations
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: |
          EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')
          echo "EXPIRES_AT=${EXPIRES_AT}" >> "$GITHUB_ENV"
          echo "Branch will expire at: ${EXPIRES_AT}"

      - name: Check Neon Credentials
        run: |
          if [ -z "$NEON_PROJECT_ID" ]; then
            echo "❌ ERROR: NEON_PROJECT_ID is not set!"
            echo "Please add NEON_PROJECT_ID as a repository variable in GitHub Settings"
            exit 1
          fi
          if [ -z "$NEON_API_KEY" ]; then
            echo "❌ ERROR: NEON_API_KEY is not set!"
            echo "Please add NEON_API_KEY as a repository secret in GitHub Settings"
            exit 1
          fi
          echo "✅ Neon credentials are set"
          echo "Project ID: ${NEON_PROJECT_ID:0:10}..."
        env:
          NEON_PROJECT_ID: "${{ vars.NEON_PROJECT_ID }}"
          NEON_API_KEY: "${{ secrets.NEON_API_KEY }}"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        continue-on-error: false
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Debug Branch Creation Outputs
        run: |
          echo "Branch creation step outputs:"
          echo "Checking if outputs exist..."
          echo "db_url exists: ${{ steps.create_neon_branch.outputs.db_url != '' && 'yes' || 'no' }}"
          echo "db_url_with_pooler exists: ${{ steps.create_neon_branch.outputs.db_url_with_pooler != '' && 'yes' || 'no' }}"
          if [ -z "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}" ]; then
            echo "❌ ERROR: db_url_with_pooler is empty!"
            echo "This means the Neon branch creation failed or didn't return a URL"
            exit 1
          fi
          echo "✅ Database URL received from Neon branch creation"
        env:
          DB_URL: "${{ steps.create_neon_branch.outputs.db_url }}"
          DB_URL_WITH_POOLER: "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"

      - name: Verify Database URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ ERROR: DATABASE_URL is empty!"
            echo "Branch creation outputs:"
            echo "db_url: ${{ steps.create_neon_branch.outputs.db_url }}"
            echo "db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"
            echo ""
            echo "Checking if Neon API credentials are set..."
            echo "NEON_PROJECT_ID: ${NEON_PROJECT_ID:+SET}" 
            echo "NEON_API_KEY: ${NEON_API_KEY:+SET}"
            echo ""
            echo "If these are not SET, please add them to GitHub Secrets/Variables"
            exit 1
          else
            echo "✅ DATABASE_URL is set (length: ${#DATABASE_URL} characters)"
            echo "First 20 chars: ${DATABASE_URL:0:20}..."
          fi
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"
          NEON_PROJECT_ID: "${{ vars.NEON_PROJECT_ID }}"
          NEON_API_KEY: "${{ secrets.NEON_API_KEY }}"

      - name: Run Database Migrations
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ ERROR: DATABASE_URL is not set. Cannot run migrations."
            exit 1
          fi
          echo "Running database migrations..."
          echo "Using DATABASE_URL (first 30 chars): ${DATABASE_URL:0:30}..."
          npm run db:push
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"

      - name: Seed Database (Optional)
        run: npm run seed:meb
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"
        continue-on-error: true

      - name: Post Schema Diff Comment to PR
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

