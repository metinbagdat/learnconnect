name: Create/Delete Branch for Pull Request (with Migrations)

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  pull-requests: write

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify project structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing files:"
          ls -la
          echo ""
          echo "Checking for package.json:"
          if [ -f "package.json" ]; then
            echo "✅ package.json found"
          else
            echo "❌ package.json not found in root"
            echo "Checking subdirectories..."
            find . -name "package.json" -type f | head -5
            exit 1
          fi
          echo ""
          echo "Checking for package-lock.json:"
          if [ -f "package-lock.json" ]; then
            echo "✅ package-lock.json found"
          else
            echo "⚠️ package-lock.json not found, will use npm install instead"
          fi

      - name: Install dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            echo "Running npm ci (clean install)..."
            if npm ci; then
              echo "✅ npm ci completed successfully"
            else
              echo "❌ npm ci failed!"
              echo ""
              echo "Common causes:"
              echo "1. package-lock.json is out of sync with package.json"
              echo "2. Node version mismatch"
              echo "3. Corrupted npm cache"
              echo ""
              echo "Attempting fallback: npm install..."
              echo "⚠️ NOTE: If this works, you should run 'npm install' locally and commit the updated package-lock.json"
              npm install
            fi
          else
            echo "package-lock.json not found, running npm install..."
            npm install
          fi

  create_neon_branch:
    name: Create Neon Branch & Run Migrations
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify project structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing files:"
          ls -la
          echo ""
          echo "Checking for package.json:"
          if [ -f "package.json" ]; then
            echo "✅ package.json found"
          else
            echo "❌ package.json not found in root"
            echo "Checking subdirectories..."
            find . -name "package.json" -type f | head -5
            exit 1
          fi
          echo ""
          echo "Checking for package-lock.json:"
          if [ -f "package-lock.json" ]; then
            echo "✅ package-lock.json found"
          else
            echo "⚠️ package-lock.json not found, will use npm install instead"
          fi

      - name: Install dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            echo "Running npm ci (clean install)..."
            if npm ci; then
              echo "✅ npm ci completed successfully"
            else
              echo "❌ npm ci failed!"
              echo ""
              echo "Common causes:"
              echo "1. package-lock.json is out of sync with package.json"
              echo "2. Node version mismatch"
              echo "3. Corrupted npm cache"
              echo ""
              echo "Attempting fallback: npm install..."
              echo "⚠️ NOTE: If this works, you should run 'npm install' locally and commit the updated package-lock.json"
              npm install
            fi
          else
            echo "package-lock.json not found, running npm install..."
            npm install
          fi

      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: |
          EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')
          echo "EXPIRES_AT=${EXPIRES_AT}" >> "$GITHUB_ENV"
          echo "Branch will expire at: ${EXPIRES_AT}"

      - name: Check Neon Credentials
        run: |
          if [ -z "$NEON_PROJECT_ID" ]; then
            echo "❌ ERROR: NEON_PROJECT_ID is not set!"
            echo "Please add NEON_PROJECT_ID as a repository variable in GitHub Settings"
            exit 1
          fi
          if [ -z "$NEON_API_KEY" ]; then
            echo "❌ ERROR: NEON_API_KEY is not set!"
            echo "Please add NEON_API_KEY as a repository secret in GitHub Settings"
            exit 1
          fi
          echo "✅ Neon credentials are set"
          echo "Project ID: ${NEON_PROJECT_ID:0:10}..."
        env:
          NEON_PROJECT_ID: "${{ vars.NEON_PROJECT_ID }}"
          NEON_API_KEY: "${{ secrets.NEON_API_KEY }}"

      - name: Sanitize branch name
        id: sanitize_branch
        run: |
          BRANCH_NAME="${{ needs.setup.outputs.branch }}"
          SANITIZED_BRANCH=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9-]/-/g' | sed 's/--*/-/g')
          echo "SANITIZED_BRANCH=${SANITIZED_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Sanitized branch name: ${SANITIZED_BRANCH}"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        continue-on-error: true
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ steps.sanitize_branch.outputs.SANITIZED_BRANCH }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Debug Branch Creation Outputs
        run: |
          echo "Branch creation step outputs:"
          echo "Checking if outputs exist..."
          echo "db_url exists: ${{ steps.create_neon_branch.outputs.db_url != '' && 'yes' || 'no' }}"
          echo "db_url_with_pooler exists: ${{ steps.create_neon_branch.outputs.db_url_with_pooler != '' && 'yes' || 'no' }}"
          if [ -z "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}" ]; then
            echo "⚠️ WARNING: db_url_with_pooler is empty!"
            echo "Neon branch may already exist or branch creation returned no URL."
            echo "Continuing in degraded mode."
          fi
          echo "✅ Debug output step completed"
        env:
          DB_URL: "${{ steps.create_neon_branch.outputs.db_url }}"
          DB_URL_WITH_POOLER: "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"
        continue-on-error: true

      - name: Verify Database URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ WARNING: DATABASE_URL is empty!"
            echo "Branch creation outputs:"
            echo "db_url: ${{ steps.create_neon_branch.outputs.db_url }}"
            echo "db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"
            echo ""
            echo "Checking if Neon API credentials are set..."
            echo "NEON_PROJECT_ID: ${NEON_PROJECT_ID:+SET}" 
            echo "NEON_API_KEY: ${NEON_API_KEY:+SET}"
            echo ""
            echo "Skipping migrations because preview database URL is unavailable."
            echo "NEON_SKIP_MIGRATIONS=true" >> "$GITHUB_ENV"
          else
            echo "✅ DATABASE_URL is set (length: ${#DATABASE_URL} characters)"
            echo "First 20 chars: ${DATABASE_URL:0:20}..."
            echo "NEON_SKIP_MIGRATIONS=false" >> "$GITHUB_ENV"
          fi
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"
          NEON_PROJECT_ID: "${{ vars.NEON_PROJECT_ID }}"
          NEON_API_KEY: "${{ secrets.NEON_API_KEY }}"
        continue-on-error: true

      - name: Run Database Migrations
        run: |
          if [ "$NEON_SKIP_MIGRATIONS" = "true" ]; then
            echo "⚠️ Skipping migrations because DATABASE_URL is unavailable."
            exit 0
          fi
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ DATABASE_URL is not set. Skipping migrations."
            exit 0
          fi
          echo "Running database migrations..."
          echo "Using DATABASE_URL (first 30 chars): ${DATABASE_URL:0:30}..."
          npm run db:push
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"
          NEON_SKIP_MIGRATIONS: "${{ env.NEON_SKIP_MIGRATIONS }}"
        continue-on-error: true

      - name: Seed Database (Optional)
        run: npm run seed:meb
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"
        continue-on-error: true

      - name: Post Schema Diff Comment to PR
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ github.event.number }}-${{ steps.sanitize_branch.outputs.SANITIZED_BRANCH }}
          api_key: ${{ secrets.NEON_API_KEY }}
        continue-on-error: true

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Sanitize branch name
        id: sanitize_branch
        run: |
          BRANCH_NAME="${{ needs.setup.outputs.branch }}"
          SANITIZED_BRANCH=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9-]/-/g' | sed 's/--*/-/g')
          echo "SANITIZED_BRANCH=${SANITIZED_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ steps.sanitize_branch.outputs.SANITIZED_BRANCH }}
          api_key: ${{ secrets.NEON_API_KEY }}

