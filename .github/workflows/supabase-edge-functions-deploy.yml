# Yerelde npm/SSL yoksa: Actions → bu workflow → Run workflow
# Gerekli repo secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF
# Bkz. docs/CONTINUE_STUDY_TRACK.md ve docs/SUPABASE_STUDY_TRACK.md

name: Supabase Edge Functions deploy

on:
  workflow_dispatch:
    inputs:
      which:
        description: "Hangi fonksiyon(lar)"
        required: true
        default: all
        type: choice
        options:
          - all
          - generate-daily-tasks
          - generate-report

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all functions
        if: github.event.inputs.which == 'all'
        run: supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Deploy generate-daily-tasks
        if: github.event.inputs.which == 'generate-daily-tasks'
        run: supabase functions deploy generate-daily-tasks --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Deploy generate-report
        if: github.event.inputs.which == 'generate-report'
        run: supabase functions deploy generate-report --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
