name: Neon Branch PR with Migrations Improved

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install

      - name: Run migrations (if defined)
        run: |
          if npm run | grep -qE ' migrate$'; then
            npm run migrate
          else
            echo "No migrate script defined; skipping."
          fi

      - name: Test
        run: |
          if npm run | grep -qE ' test$'; then
            npm test
          else
            npm run test:smoke:regression
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        run: |
          npm run build

      - name: Deploy
        run: |
          npm run deploy
      
      - name: Check Neon Credentials
        env:
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          test -n "$NEON_PROJECT_ID"
          test -n "$NEON_API_KEY"