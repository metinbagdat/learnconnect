name: Neon Branch PR with Migrations Improved

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install

      - name: Check DB connection env
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: test -n "$DATABASE_URL" || { echo 'DATABASE_URL secret is not set'; exit 1; }

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm run migrate

      - name: Test
        run: |
          npm test

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        run: |
          npm run build

      - name: Deploy
        run: |
          npm run deploy
      
      - name: Check Neon Credentials
        env:
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          test -n "$NEON_PROJECT_ID"
          test -n "$NEON_API_KEY"