name: Neon Branch PR with Migrations Improved

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14

      - name: Install dependencies
        run: |
          npm install

      - name: Run migrations
        run: |
          npm run migrate

      - name: Test
        run: |
          npm test

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14

      - name: Build
        run: |
          npm run build

      - name: Deploy
        run: |
          npm run deploy
          
      - name: Check Neon Credentials
        env:
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          echo "🔍 Verifying Neon credentials..."
          if [ -z "$NEON_PROJECT_ID" ]; then
            echo "❌ ERROR: NEON_PROJECT_ID is not set!"
            exit 1
          fi
          if [ -z "$NEON_API_KEY" ]; then
            echo "❌ ERROR: NEON_API_KEY is not set!"
            exit 1
          fi
          echo "✅ Neon credentials are set"
      
