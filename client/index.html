    <!-- Inline SES noise filter: run as early as possible -->
    <script>
      (function() {
        'use strict';

        window.__sesConsoleNoiseSuppressed = 0;

        function stringOf(value) {
          try {
            if (typeof value === 'string') return value;
            if (value && typeof value.message === 'string') return value.message;
            return String(value);
          } catch (_) {
            return '';
          }
        }

        function isSesNoise(args) {
          var patterns = [
            'SES Removing unpermitted intrinsics',
            'Removing intrinsics.%',
            'lockdown-install.js',
            '%MapPrototype%.getOrInsert',
            '%MapPrototype%.getOrInsertComputed',
            '%WeakMapPrototype%.getOrInsert',
            '%WeakMapPrototype%.getOrInsertComputed',
            '%DatePrototype%.toTemporalInstant'
          ];

          for (var i = 0; i < args.length; i++) {
            var raw = args[i];
            var text = stringOf(raw);
            for (var j = 0; j < patterns.length; j++) {
              if (text.indexOf(patterns[j]) !== -1) {
                return true;
              }
            }
          }
          return false;
        }

        function wrapConsoleMethod(methodName) {
          var original = console[methodName];
          if (typeof original !== 'function') return;
          console[methodName] = function() {
            var args = Array.prototype.slice.call(arguments);
            if (isSesNoise(args)) {
              window.__sesConsoleNoiseSuppressed++;
              return;
            }
            return original.apply(console, args);
          };
        }

        wrapConsoleMethod('error');
        wrapConsoleMethod('warn');
        wrapConsoleMethod('info');
        wrapConsoleMethod('log');
        wrapConsoleMethod('debug');
      })();
    </script>

    <!-- Inline SES Guard: Run before any bundled JS to intercept SES-related errors -->
    <script>
      (function() {
        'use strict';
        
        // Track SES errors seen during initial page load
        window.__sesInlineGuardErrors = 0;
        window.__egitimTodaySesGuardActive = true;
        
        /**
         * Check if an error/message is SES-related
         */
        function isSesRelated(errorOrMessage) {
          if (!errorOrMessage) return false;
          
          var str = String(errorOrMessage);
          var message = errorOrMessage.message || str;
          var stack = errorOrMessage.stack || '';
          
          // SES/lockdown patterns
          var patterns = [
            'SES_UNCAUGHT_EXCEPTION',
            'lockdown-install.js',
            'Removing intrinsics.%',
            'lockdown',
            'SES_'
          ];
          
          for (var i = 0; i < patterns.length; i++) {
            if (message.indexOf(patterns[i]) !== -1 || 
                stack.indexOf(patterns[i]) !== -1 || 
                str.indexOf(patterns[i]) !== -1) {
              return true;
            }
          }
          
          // React is undefined in SES context
          var hasReactError = message.indexOf('React is undefined') !== -1 || 
                              message.indexOf("can't access property \"useState\", React is undefined") !== -1;
          var hasSesInStack = stack.indexOf('lockdown') !== -1 || 
                              stack.indexOf('SES') !== -1 || 
                              str.indexOf('SES') !== -1;
          
          if (hasReactError && hasSesInStack) {
            return true;
          }
          
          return false;
        }
        
        /**
         * Global error handler - runs in capture phase to intercept early
         */
        window.addEventListener('error', function(event) {
          var error = event.error || event.message;
          
          if (isSesRelated(error) || isSesRelated(event.message)) {
            window.__sesInlineGuardErrors++;
            window.__sesInlineGuardLastError = String(event.message || error || '');
            event.preventDefault();
            event.stopImmediatePropagation();
            return false;
          }
          
          // Let normal errors propagate
          return true;
        }, true); // Capture phase
        
        /**
         * Unhandled rejection handler
         */
        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason;
          
          if (isSesRelated(reason)) {
            window.__sesInlineGuardErrors++;
            window.__sesInlineGuardLastRejection = String(reason || '');
            event.preventDefault();
            event.stopImmediatePropagation();
            return false;
          }
          
          // Let normal rejections propagate
          return true;
        }, true); // Capture phase
        
        window.__sesInlineGuardActive = true;
      })();
    </script>
