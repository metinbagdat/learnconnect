<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduLearn - TYT & AYT Hazırlık | Online Eğitim Platformu</title>
    
    <!-- ✅ CRITICAL: Add inline script to suppress SES errors BEFORE any other scripts load -->
    <!-- This must be in the <head> and run immediately to catch SES errors from extensions -->
    <script>
      // Suppress SES errors from browser extensions BEFORE anything else runs
      (function() {
        'use strict';
        
        // Store original console methods
        var originalError = console.error;
        var originalWarn = console.warn;
        
        // Override console.error immediately
        console.error = function() {
          var message = Array.prototype.join.call(arguments, ' ');
          if (
            message.indexOf('SES') !== -1 ||
            message.indexOf('lockdown') !== -1 ||
            message.indexOf('Removing unpermitted intrinsics') !== -1 ||
            message.indexOf('Removing intrinsics') !== -1 ||
            message.indexOf('getOrInsert') !== -1 ||
            message.indexOf('toTemporalInstant') !== -1 ||
            message.indexOf('lockdown-install.js') !== -1
          ) {
            // Silently suppress SES errors
            return;
          }
          originalError.apply(console, arguments);
        };
        
        // Override console.warn immediately
        console.warn = function() {
          var message = Array.prototype.join.call(arguments, ' ');
          if (
            message.indexOf('SES') !== -1 ||
            message.indexOf('lockdown') !== -1 ||
            message.indexOf('Removing unpermitted intrinsics') !== -1 ||
            message.indexOf('Removing intrinsics') !== -1 ||
            message.indexOf('getOrInsert') !== -1 ||
            message.indexOf('toTemporalInstant') !== -1 ||
            message.indexOf('lockdown-install.js') !== -1
          ) {
            // Silently suppress SES warnings
            return;
          }
          originalWarn.apply(console, arguments);
        };
        
        // Catch SES errors globally before they propagate
        window.addEventListener('error', function(event) {
          var message = event.message || '';
          var source = event.filename || '';
          
          if (
            message.indexOf('SES') !== -1 ||
            source.indexOf('lockdown') !== -1 ||
            message.indexOf('SES_UNCAUGHT_EXCEPTION') !== -1
          ) {
            event.preventDefault();
            event.stopPropagation();
            return false;
          }
        }, true); // Capture phase - catch early
        
        // Catch SES promise rejections
        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason;
          var message = (reason && reason.message) || String(reason || '');
          
          if (
            message.indexOf('SES') !== -1 ||
            message.indexOf('lockdown') !== -1 ||
            message.indexOf('SES_UNCAUGHT_EXCEPTION') !== -1
          ) {
            event.preventDefault();
            return;
          }
        }, true); // Capture phase
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
