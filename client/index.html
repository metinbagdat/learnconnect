    <!-- ✅ CRITICAL: Disable SES completely BEFORE any other scripts load -->
    <script>
      // ✅ ACİL FIX: SES'i tamamen devre dışı bırak
      (function() {
        'use strict';
        console.log('🚫 SES tamamen devre dışı bırakılıyor...');
        
        // 1. lockdown fonksiyonunu override et
        if (typeof window !== 'undefined') {
          window.lockdown = function() {
            console.warn('⚠️ SES lockdown engellendi');
            return {};
          };
          
          // 2. harden fonksiyonunu bypass et
          window.harden = function(obj) {
            console.warn('⚠️ SES harden engellendi');
            return obj;
          };
          
          // 3. SES hatalarını tamamen gizle
          const originalError = console.error;
          const originalWarn = console.warn;
          
          console.error = function(...args) {
            const message = args.join(' ');
            if (
              message.includes('SES') ||
              message.includes('Removing unpermitted intrinsics') ||
              message.includes('MapPrototype') ||
              message.includes('WeakMapPrototype') ||
              message.includes('DatePrototype') ||
              message.includes('getOrInsert') ||
              message.includes('toTemporalInstant') ||
              message.includes('lockdown-install.js')
            ) {
              return; // SES hatalarını tamamen gizle
            }
            originalError.apply(console, args);
          };
          
          console.warn = function(...args) {
            const message = args.join(' ');
            if (
              message.includes('SES') ||
              message.includes('Removing unpermitted intrinsics') ||
              message.includes('MapPrototype') ||
              message.includes('WeakMapPrototype') ||
              message.includes('DatePrototype') ||
              message.includes('getOrInsert') ||
              message.includes('toTemporalInstant') ||
              message.includes('lockdown-install.js')
            ) {
              return; // SES uyarılarını tamamen gizle
            }
            originalWarn.apply(console, args);
          };
          
          // 4. Global error handler - SES hatalarını yakala
          window.addEventListener('error', function(event) {
            const message = event.message || '';
            const source = event.filename || '';
            if (
              message.includes('SES') ||
              source.includes('lockdown') ||
              message.includes('SES_UNCAUGHT_EXCEPTION')
            ) {
              event.preventDefault();
              event.stopPropagation();
              return false;
            }
          }, true);
          
          window.addEventListener('unhandledrejection', function(event) {
            const reason = event.reason;
            const message = (reason && reason.message) || String(reason || '');
            if (
              message.includes('SES') ||
              message.includes('lockdown') ||
              message.includes('SES_UNCAUGHT_EXCEPTION')
            ) {
              event.preventDefault();
              return;
            }
          }, true);
        }
      })();
    </script>
    <!-- ✅ CRITICAL: Add inline script to suppress SES errors BEFORE any other scripts load -->
    <!-- This must be in the <head> and run immediately to catch SES errors from extensions -->
    <script>
      // Suppress SES errors from browser extensions BEFORE anything else runs
      (function() {
        'use strict';
        
        // Store original console methods
        var originalError = console.error;
        var originalWarn = console.warn;
        
        // Override console.error immediately
        console.error = function() {
          var message = Array.prototype.join.call(arguments, ' ');
          if (
            message.indexOf('SES') !== -1 ||
            message.indexOf('lockdown') !== -1 ||
            message.indexOf('Removing unpermitted intrinsics') !== -1 ||
            message.indexOf('Removing intrinsics') !== -1 ||
            message.indexOf('getOrInsert') !== -1 ||
            message.indexOf('toTemporalInstant') !== -1 ||
            message.indexOf('lockdown-install.js') !== -1
          ) {
            // Silently suppress SES errors
            return;
          }
          originalError.apply(console, arguments);
        };
        
        // Override console.warn immediately
        console.warn = function() {
          var message = Array.prototype.join.call(arguments, ' ');
          if (
            message.indexOf('SES') !== -1 ||
            message.indexOf('lockdown') !== -1 ||
            message.indexOf('Removing unpermitted intrinsics') !== -1 ||
            message.indexOf('Removing intrinsics') !== -1 ||
            message.indexOf('getOrInsert') !== -1 ||
            message.indexOf('toTemporalInstant') !== -1 ||
            message.indexOf('lockdown-install.js') !== -1
          ) {
            // Silently suppress SES warnings
            return;
          }
          originalWarn.apply(console, arguments);
        };
        
        // Catch SES errors globally before they propagate
        window.addEventListener('error', function(event) {
          var message = event.message || '';
          var source = event.filename || '';
          
          if (
            message.indexOf('SES') !== -1 ||
            source.indexOf('lockdown') !== -1 ||
            message.indexOf('SES_UNCAUGHT_EXCEPTION') !== -1
          ) {
            event.preventDefault();
            event.stopPropagation();
            return false;
          }
        }, true); // Capture phase - catch early
        
        // Catch SES promise rejections
        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason;
          var message = (reason && reason.message) || String(reason || '');
          
          if (
            message.indexOf('SES') !== -1 ||
            message.indexOf('lockdown') !== -1 ||
            message.indexOf('SES_UNCAUGHT_EXCEPTION') !== -1
          ) {
            event.preventDefault();
            return;
          }
        }, true); // Capture phase
      })();
    </script>

  <body>
    <div id="root">
      <!-- ✅ Fallback: Show loading state immediately while JS loads -->
      <div id="app-loading-fallback" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f9fafb; font-family: system-ui, -apple-system, sans-serif;">
        <div style="text-align: center; max-width: 500px; padding: 20px;">
          <div style="width: 48px; height: 48px; border: 4px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
          <h2 style="color: #111827; margin-bottom: 8px; font-size: 20px; font-weight: 600;">EduLearn Yükleniyor...</h2>
          <p style="color: #6b7280; font-size: 14px; margin-bottom: 24px;">Uygulama başlatılıyor, lütfen bekleyin.</p>
        </div>
      </div>
    </div>
    
    <!-- ✅ Critical: Fallback script that runs if main app fails to load -->
    <script>
      (function() {
        'use strict';
        
        // Hide loading fallback when app loads (after 10 seconds max)
        var loadingFallback = document.getElementById('app-loading-fallback');
        var hideLoading = function() {
          if (loadingFallback) {
            loadingFallback.style.display = 'none';
          }
        };
        
        // Hide after DOMContentLoaded (app should be mounted by then)
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            setTimeout(hideLoading, 2000); // Give app 2 seconds to mount
          });
        } else {
          setTimeout(hideLoading, 2000);
        }
        
        // If app doesn't load after 10 seconds, show error
        setTimeout(function() {
          if (loadingFallback && loadingFallback.style.display !== 'none') {
            loadingFallback.innerHTML = '<div style="text-align: center; max-width: 500px; padding: 20px;"><h2 style="color: #dc2626; margin-bottom: 16px;">Uygulama Yüklenemedi</h2><p style="color: #6b7280; margin-bottom: 24px;">JavaScript dosyaları yüklenemedi. Lütfen sayfayı yenileyin veya tarayıcı önbelleğini temizleyin.</p><button onclick="window.location.reload(true)" style="background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-right: 8px;">Sayfayı Yenile</button><button onclick="localStorage.clear(); sessionStorage.clear(); window.location.reload(true)" style="background: #6b7280; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px;">Önbelleği Temizle</button></div>';
          }
        }, 10000);
        
        // CSS animation for spinner
        var style = document.createElement('style');
        style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
        document.head.appendChild(style);
      })();
    </script>
