<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnConnect</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 10px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
      }
      h1 {
        font-size: 36px;
        margin-bottom: 20px;
      }
      p {
        font-size: 18px;
        margin-bottom: 30px;
      }
      .status {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 8px;
        text-align: left;
        margin: 20px 0;
      }
      .status p {
        margin: 10px 0;
        font-size: 14px;
      }
      .button {
        display: inline-block;
        padding: 12px 30px;
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid white;
        border-radius: 5px;
        color: white;
        text-decoration: none;
        font-weight: bold;
        margin-top: 20px;
        cursor: pointer;
      }
      .button:hover {
        background: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎓 LearnConnect</h1>
      <p>TYT & AYT Akıllı Planlayıcı</p>
      
      <div class="status">
        <p>✅ Server: Running</p>
        <p>✅ Port: 5173</p>
        <p>✅ Docker: Active</p>
        <p>✅ Firebase: Configured</p>
        <p>✅ React: Ready</p>
      </div>

      <p>Uygulamaya hoş geldiniz!</p>
      <a href="#" class="button">Başla →</a>
      
      <div style="margin-top: 40px; font-size: 12px; opacity: 0.8;">
        <p>© 2024 LearnConnect. Tüm hakları saklıdır.</p>
      </div>
    </div>
  </body>
</html>
